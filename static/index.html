<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكي ماتك - النسخة المبسطة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: black;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h2 {
            font-size: 2.2em;
            color: #333;
            margin-bottom: 30px;
        }
        .search-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 60px;
            padding: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            border: 2px solid black;
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 20px 30px;
            font-size: 1.2em;
            border-radius: 60px;
        }
        .search-btn {
            background: black;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-right: 10px;
            cursor: pointer;
            font-size: 1.5em;
        }
        .examples {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .example-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .example-btn:hover {
            background: #e0e0e0;
        }
        .result-area {
            width: 100%;
            max-width: 700px;
            margin-top: 30px;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            text-align: right;
            display: none;
        }
        .result-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border-right: 4px solid black;
            font-size: 1.2em;
        }
        .step-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border-right: 3px solid #666;
        }
        .error {
            color: #dc3545;
            padding: 20px;
            background: #f8d7da;
            border-radius: 10px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 30px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid black;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 ذكي ماتك - النسخة المبسطة</h1>
    </div>
    
    <div class="main-content">
        <h2>اسأل أي سؤال رياضي</h2>
        
        <div class="search-container">
            <input type="text" class="search-input" id="question" 
                   placeholder="مثال: مشتقة x^2, تكامل sin x, 2+2">
            <button class="search-btn" onclick="ask()">➡️</button>
        </div>
        
        <div class="examples">
            <div class="example-btn" onclick="setExample('مشتقة x^2')">📈 مشتقة x²</div>
            <div class="example-btn" onclick="setExample('تكامل sin x')">📊 تكامل sin x</div>
            <div class="example-btn" onclick="setExample('حل 2x+5=13')">⚖️ حل معادلة</div>
            <div class="example-btn" onclick="setExample('2+2')">🧮 2+2</div>
        </div>
        
        <div id="result" class="result-area"></div>
    </div>
    
    <script>
        function setExample(text) {
            document.getElementById('question').value = text;
            ask();
        }
        
        async function ask() {
            const question = document.getElementById('question').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!question) return;
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/solve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    let html = `<div class="result-box"><strong>النتيجة:</strong> ${data.result}</div>`;
                    
                    if (data.steps && data.steps.length > 0) {
                        html += '<div class="steps"><br><strong>الخطوات:</strong>';
                        data.steps.forEach(step => {
                            html += `<div class="step-item">${step.text}</div>`;
                        });
                        html += '</div>';
                    }
                    
                    if (data.model) {
                        html += `<div style="margin-top:15px; color:#666;">🔄 ${data.model}</div>`;
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="error">❌ خطأ في الاتصال</div>';
            }
        }
    </script>
</body>
</html>
